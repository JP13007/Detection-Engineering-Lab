title: Failed Privilege Escalation via Account Creation
id: detection-003
description: Detects multiple failed attempts to create local user accounts or add users to administrative groups using net.exe commands. Common post-exploitation persistence technique that is blocked by UAC or insufficient privileges.
author: JP13007
date: 2026/06/16
modified: 2026/06/16

detection:
  selection1:
    EventID: 1
    Image|endswith: '\net.exe'
    CommandLine|contains:
      - 'user'
      - 'localgroup'
      - 'group'
    
  selection2:
    EventID: 5
    Image|endswith: '\net.exe'
    
  timeframe: 60s
  
  condition: (selection1 or selection2) | near selection2 timeframe
  
falsepositives:
  - System administrators running legitimate user management scripts
  - Help desk tools automating account creation/modification
  - Compliance scanning tools enumerating group memberships
  - Batch user provisioning during onboarding

level: medium
status: stable
tags:
  - attack.persistence
  - attack.t1136.001
  - attack.privilege_escalation
  - attack.t1548.002

references:
  - https://attack.mitre.org/techniques/T1136/001/
  - https://attack.mitre.org/techniques/T1548/002/


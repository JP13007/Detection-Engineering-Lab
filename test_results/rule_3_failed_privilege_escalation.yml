## Rule Tuning Notes

**False Positive Reduction:**

1. **Process context** — Alert only if net.exe is spawned by cmd.exe or PowerShell from a non-admin process. If spawned by SYSTEM or admin context, it's likely legitimate administration.

2. **Source whitelisting** — Whitelist known admin tools:
   - Active Directory management tools
   - System Configuration Manager (SCCM)
   - Puppet, Ansible, Chef configurations
   - ServiceNow automation scripts

3. **Baseline tuning** — Document how many times admins legitimately run these commands in your environment:
   - If they run it 10x per day during onboarding, adjust alert threshold
   - If it's rare, alert on every occurrence

4. **Command-line filtering** — Add context to the rule:
   ```
   CommandLine|contains: 'net user'
   AND NOT CommandLine|contains: '/add'  # Exclude user creation attempts
   ```

5. **Event log monitoring** — Pair with Windows Security Event ID 4720 (user account created) to detect successful escalation

**Recommended SPL conversion (Splunk):**
```spl
sourcetype=WinEventLog:Sysmon EventID=1 Image="*net.exe" (CommandLine="*user*" OR CommandLine="*localgroup*")
| stats count, latest(CommandLine) by User, ComputerName, Image
| where count > 3  # More than 3 attempts in the timeframe
```

**Recommended KQL conversion (Microsoft Sentinel):**
```kql
DeviceProcessEvents
| where FileName =~ "net.exe"
| where CommandLine contains "user" or CommandLine contains "localgroup"
| where InitiatingProcessName !in ("explorer.exe", "svchost.exe")
| summarize EventCount = count() by InitiatingProcessName, FileName, ComputerName, bin(TimeGenerated, 1m)
| where EventCount > 3
```

**Alternative: Use Event Log directly**
```spl
source="WinEventLog:Security" EventCode=4625
| stats count by Account, ComputerName
| where count > 5  # More than 5 failed logins = potential brute force or escalation attempt
```
